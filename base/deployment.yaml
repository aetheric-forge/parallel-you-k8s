apiVersion: apps/v1
kind: Deployment
metadata:
  name: parallel-you
  namespace: aetheric-forge
spec:
  replicas: 1
  revisionHistoryLimit: 3
  progressDeadlineSeconds: 180
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: parallel-you
  template:
    metadata:
      labels:
        app.kubernetes.io/name: parallel-you
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      serviceAccountName: parallel-you
      imagePullSecrets: []
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        runAsGroup: 1654
        fsGroup: 1654
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: parallel-you
          image: ghcr.io/aetheric-forge/parallel-you:1.0.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
              value: "true"
          envFrom:
            - secretRef:
                name: parallel-you-config
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            failureThreshold: 30
            periodSeconds: 2
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            failureThreshold: 3
            periodSeconds: 20
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: data-protection-keys
              mountPath: /home/app/.aspnet/DataProtection-Keys
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data-protection-keys
          persistentVolumeClaim:
            claimName: parallel-you-data-protection
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
